<body>
  <div class="container">
    <div class="header">
      <h2>User Journey</h2>
      <p>The onboarding experience flow</p>
    </div>
    
    <div class="flow-container">
      <div class="flow-node active">
        <div class="flow-title">1. Registration</div>
        <div class="flow-desc">User enters email and password, or uses social login.</div>
      </div>
      
      <div class="flow-arrow"></div>
      
      <div class="flow-node">
        <div class="flow-title">2. Profile Setup</div>
        <div class="flow-desc">User enters their name, role, and uploads an avatar.</div>
      </div>
      
      <div class="flow-arrow"></div>
      
      <div class="flow-node">
        <div class="flow-title">3. Workspace Creation</div>
        <div class="flow-desc">User creates their first workspace and invites team members.</div>
      </div>
    </div>
  </div>
