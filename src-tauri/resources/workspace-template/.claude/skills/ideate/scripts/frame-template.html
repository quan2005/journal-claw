<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ideate</title>
  <style>
    /*
     * IDEATE VISUAL COMPANION — CSS REFERENCE
     *
     * Design philosophy: Quieter — every pixel intentional, nothing gratuitous.
     * Warm stone neutrals, single indigo accent, typography-led hierarchy.
     *
     * Anti-patterns actively avoided:
     *   - Pure gray surfaces (all neutrals carry a warm stone tint)
     *   - transition: all (always specify properties)
     *   - bounce/elastic easing (use ease-out-quart)
     *   - Card hover lift + shadow (border-color shift only)
     *   - Uniform border-radius (vary by semantic role)
     *   - Gradient text, glow effects, decorative blur
     *
     * Replace <!-- CONTENT --> with your content.
     */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== EASING ===== */
    :root {
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 150ms;
      --duration-normal: 200ms;
    }

    /* ===== LIGHT THEME (warm stone) ===== */
    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --surface-dim: #edebe7;
      --border: #ddd9d3;
      --text: #1c1917;
      --text-2: #6f6963;
      --text-3: #a39d97;
      --accent: #4338ca;
      --accent-hover: #3730a3;
      --accent-subtle: rgba(67, 56, 202, 0.06);
      --accent-on: #ffffff;
      --positive: #16a34a;
      --negative: #b91c1c;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    /* ===== DARK THEME (warm ink) ===== */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1816;
        --surface: #262320;
        --surface-dim: #33302c;
        --border: #3d3935;
        --text: #ede9e3;
        --text-2: #9a958f;
        --text-3: #6b6660;
        --accent: #a5b4fc;
        --accent-hover: #c7d2fe;
        --accent-subtle: rgba(165, 180, 252, 0.08);
        --accent-on: #1a1816;
        --positive: #4ade80;
        --negative: #fca5a5;
      }
    }

    /* ===== BASE ===== */
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 3rem 2rem;
      max-width: 720px;
      margin: 0 auto;
    }

    /* ===== TYPOGRAPHY ===== */
    h2 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.015em;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }

    h3 {
      font-size: 1.0625rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0.25rem;
    }

    h4 {
      font-size: 0.8125rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.375rem;
    }

    .subtitle {
      color: var(--text-2);
      font-size: 1rem;
      line-height: 1.55;
      margin-bottom: 2rem;
    }

    .section { margin-bottom: 2.5rem; }

    .label {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.625rem;
    }

    /* ===== OPTIONS (A/B/C choices) ===== */
    .options {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .option {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 0.875rem;
      transition:
        border-color var(--duration-normal) var(--ease-out),
        background-color var(--duration-normal) var(--ease-out);
    }

    .option:hover {
      border-color: var(--accent);
    }

    .option.selected {
      background: var(--accent-subtle);
      border-color: var(--accent);
    }

    .option .letter {
      background: var(--surface-dim);
      color: var(--text-2);
      width: 1.625rem;
      height: 1.625rem;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.75rem;
      flex-shrink: 0;
      transition: background-color var(--duration-normal) var(--ease-out),
                  color var(--duration-normal) var(--ease-out);
    }

    .option.selected .letter {
      background: var(--accent);
      color: var(--accent-on);
    }

    .option .content { flex: 1; }
    .option .content h3 { font-size: 0.9375rem; margin-bottom: 0.125rem; }
    .option .content p { color: var(--text-2); font-size: 0.8125rem; margin: 0; line-height: 1.5; }

    /* ===== CARDS (visual designs / mockups) ===== */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      transition: border-color var(--duration-normal) var(--ease-out);
    }

    .card:hover { border-color: var(--accent); }
    .card.selected { border-color: var(--accent); background: var(--accent-subtle); }

    .card-image {
      background: var(--surface-dim);
      aspect-ratio: 16 / 10;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }

    .card-body { padding: 1rem; }
    .card-body h3 { margin-bottom: 0.25rem; }
    .card-body p { color: var(--text-2); font-size: 0.8125rem; line-height: 1.5; }

    /* ===== MOCKUP CONTAINER ===== */
    .mockup {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .mockup-header {
      background: var(--surface-dim);
      padding: 0.5rem 1rem;
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
    }

    .mockup-body { padding: 1.5rem; }

    /* ===== SPLIT VIEW ===== */
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    .split .mockup { margin-bottom: 0; }
    @media (max-width: 640px) { .split { grid-template-columns: 1fr; } }

    /* ===== PROS / CONS ===== */
    .pros-cons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.875rem;
      margin: 1.25rem 0;
    }

    .pros, .cons {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
    }

    .pros h4 { color: var(--positive); }
    .cons h4 { color: var(--negative); }
    .pros ul, .cons ul { margin-left: 1.125rem; font-size: 0.8125rem; color: var(--text-2); }
    .pros li, .cons li { margin-bottom: 0.25rem; line-height: 1.5; }

    @media (max-width: 480px) { .pros-cons { grid-template-columns: 1fr; } }

    /* ===== PLACEHOLDER ===== */
    .placeholder {
      background: var(--surface-dim);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 2rem;
      text-align: center;
      color: var(--text-3);
      font-size: 0.8125rem;
    }

    /* ===== WIREFRAME ELEMENTS ===== */
    .mock-nav {
      background: var(--surface-dim);
      color: var(--text-2);
      padding: 0.625rem 1rem;
      display: flex;
      gap: 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }

    .mock-sidebar {
      background: var(--surface-dim);
      padding: 1rem;
      min-width: 160px;
      font-size: 0.8125rem;
      color: var(--text-3);
      border-right: 1px solid var(--border);
    }

    .mock-content {
      padding: 1.5rem;
      flex: 1;
      font-size: 0.875rem;
      color: var(--text-2);
    }

    .mock-button {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity var(--duration-fast) var(--ease-out);
    }
    .mock-button:hover { opacity: 0.85; }

    .mock-button-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color var(--duration-fast) var(--ease-out);
    }
    .mock-button-secondary:hover { border-color: var(--text-2); }

    .mock-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.5rem 0.75rem;
      width: 100%;
      color: var(--text);
      font-size: 0.875rem;
      font-family: inherit;
      transition: border-color var(--duration-fast) var(--ease-out);
    }
    .mock-input:focus { outline: none; border-color: var(--accent); }

    /* ===== ANNOTATION ===== */
    .note {
      font-size: 0.8125rem;
      color: var(--text-3);
      font-style: italic;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    /* ===== DIVIDER ===== */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<!-- CONTENT -->

<script>
function toggleSelect(el) {
  var container = el.closest('.options') || el.closest('.cards');
  var multi = container && container.dataset.multiselect !== undefined;
  if (container && !multi) {
    container.querySelectorAll('.option, .card').forEach(function(o) {
      o.classList.remove('selected');
    });
  }
  if (multi) { el.classList.toggle('selected'); }
  else { el.classList.add('selected'); }
}
</script>

</body>
</html>
