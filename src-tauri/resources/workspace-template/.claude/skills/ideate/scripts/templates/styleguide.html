<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ideate - Styleguide Canvas</title>
  <style>
    /*
     * IDEATE VISUAL COMPANION — STYLEGUIDE TEMPLATE
     * Used for presenting typography, colors, and design tokens.
     */
    :root {
      --bg: #FAFAFA; --surface: #FFFFFF; --border: #E5E5E5;
      --text-main: #111111; --text-muted: #666666; --text-tertiary: #999999;
      --radius-md: 12px; --radius-lg: 16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0A0A0A; --surface: #141414; --border: #2A2A2A;
        --text-main: #EEEEEE; --text-muted: #888888; --text-tertiary: #555555;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background-color: var(--bg); background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 24px 24px;
      color: var(--text-main); line-height: 1.6; padding: 4rem 2rem; display: flex; justify-content: center; min-height: 100vh;
    }
    .canvas { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 4rem; }
    
    .header { text-align: left; border-bottom: 2px solid var(--text-main); padding-bottom: 2rem; }
    .header h2 { font-size: 3rem; font-weight: 700; letter-spacing: -0.04em; margin-bottom: 0.5rem; }
    .header p { font-size: 1.25rem; color: var(--text-muted); }
    
    .section-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
    .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    
    /* Colors */
    .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1.5rem; }
    .color-swatch { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); background: var(--surface); }
    .color-fill { height: 100px; width: 100%; }
    .color-info { padding: 1rem; }
    .color-name { font-weight: 600; font-size: 0.9375rem; margin-bottom: 0.25rem; }
    .color-hex { font-family: monospace; font-size: 0.8125rem; color: var(--text-muted); }
    
    /* Typography */
    .type-specimen { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; display: flex; flex-direction: column; gap: 2rem; }
    .type-row { display: flex; align-items: baseline; gap: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
    .type-row:last-child { border-bottom: none; padding-bottom: 0; }
    .type-label { width: 100px; font-size: 0.875rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    
    /* Example Font Classes */
    .type-sample.h1 { font-size: 3rem; font-weight: 700; letter-spacing: -0.04em; line-height: 1.1; }
    .type-sample.h2 { font-size: 2rem; font-weight: 600; letter-spacing: -0.03em; line-height: 1.2; }
    .type-sample.body { font-size: 1.125rem; font-weight: 400; line-height: 1.6; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="header">
      <h2><!-- TITLE (e.g. Brand Identity) --></h2>
      <p><!-- SUBTITLE (e.g. Visual Style & Tokens) --></p>
    </div>
    
    <div>
      <h3 class="section-title">Color Palette</h3>
      <div class="color-grid">
        <div class="color-swatch">
          <div class="color-fill" style="background: #000000;"></div>
          <div class="color-info"><div class="color-name">Primary</div><div class="color-hex">#000000</div></div>
        </div>
        <div class="color-swatch">
          <div class="color-fill" style="background: #4338CA;"></div>
          <div class="color-info"><div class="color-name">Accent</div><div class="color-hex">#4338CA</div></div>
        </div>
        <div class="color-swatch">
          <div class="color-fill" style="background: #F4F4F5;"></div>
          <div class="color-info"><div class="color-name">Surface</div><div class="color-hex">#F4F4F5</div></div>
        </div>
      </div>
    </div>
    
    <div>
      <h3 class="section-title">Typography</h3>
      <div class="type-specimen">
        <div class="type-row">
          <div class="type-label">Heading 1</div>
          <div class="type-sample h1">The quick brown fox</div>
        </div>
        <div class="type-row">
          <div class="type-label">Heading 2</div>
          <div class="type-sample h2">Jumps over the lazy dog</div>
        </div>
        <div class="type-row">
          <div class="type-label">Body</div>
          <div class="type-sample body">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
