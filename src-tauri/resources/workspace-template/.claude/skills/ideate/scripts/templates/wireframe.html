<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ideate - Wireframe Canvas</title>
  <style>
    /*
     * IDEATE VISUAL COMPANION — WIREFRAME TEMPLATE
     * Used for UI layout mockups, components, and structure.
     */
    :root {
      --bg: #FAFAFA; --bg-canvas: #F4F4F5; --surface: #FFFFFF; --border: #E5E5E5; --border-hover: #D4D4D4;
      --text-main: #111111; --text-muted: #666666; --text-tertiary: #999999;
      --accent: #000000; --accent-surface: #F5F5F5; --accent-text: #FFFFFF;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
      --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.1); --duration: 300ms;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0A0A0A; --bg-canvas: #000000; --surface: #141414; --border: #2A2A2A; --border-hover: #3A3A3A;
        --text-main: #EEEEEE; --text-muted: #888888; --text-tertiary: #555555;
        --accent: #FFFFFF; --accent-surface: #1E1E1E; --accent-text: #000000;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background-color: var(--bg); background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 24px 24px;
      color: var(--text-main); line-height: 1.6; padding: 4rem 2rem; display: flex; justify-content: center; min-height: 100vh;
    }
    .canvas { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 2rem; }
    .header { text-align: center; margin-bottom: 1rem; }
    .header h2 { font-size: 2rem; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
    .header p { font-size: 1.0625rem; color: var(--text-muted); }
    
    /* Mockup Window */
    .mockup-window {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl);
      overflow: hidden; box-shadow: var(--shadow-md); display: flex; flex-direction: column;
      transition: transform var(--duration) var(--ease-spring);
    }
    .mockup-window:hover { transform: scale(1.01); }
    
    .mockup-bar {
      height: 48px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 1.25rem; gap: 0.5rem; background: var(--bg-canvas);
    }
    .mockup-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--border-hover); }
    .mockup-dot.r { background: #FF5F56; } .mockup-dot.y { background: #FFBD2E; } .mockup-dot.g { background: #27C93F; }
    
    .mockup-content { display: flex; min-height: 500px; }
    
    /* Layouts inside Mockup */
    .wire-sidebar { width: 240px; border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; background: var(--bg-canvas); }
    .wire-main { flex: 1; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }
    
    /* Wireframe Primitives */
    .wire-block { background: var(--border); border-radius: var(--radius-sm); height: 1rem; }
    .wire-nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .wire-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; background: var(--surface); }
    .wire-button { background: var(--accent); color: var(--accent-text); border: none; padding: 0.75rem 1.5rem; border-radius: var(--radius-md); font-weight: 500; text-align: center; }
    .wire-input { border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.75rem 1rem; color: var(--text-muted); }
    
    /* Mobile Device Frame */
    .mobile-frame-container { display: flex; justify-content: center; gap: 3rem; flex-wrap: wrap; margin-top: 2rem; }
    .mobile-frame {
      width: 320px; height: 640px; border: 12px solid var(--border); border-radius: 36px; background: var(--surface);
      overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-md); position: relative;
    }
    .mobile-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: var(--border); border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; z-index: 10; }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="header">
      <h2><!-- TITLE (e.g. Dashboard Wireframe) --></h2>
      <p><!-- SUBTITLE (e.g. Early exploration of the main view) --></p>
    </div>
    
    <!-- DESKTOP MOCKUP -->
    <div class="mockup-window">
      <div class="mockup-bar">
        <div class="mockup-dot r"></div><div class="mockup-dot y"></div><div class="mockup-dot g"></div>
      </div>
      <div class="mockup-content">
        <!-- Sidebar -->
        <div class="wire-sidebar">
          <div class="wire-block" style="width: 80%; height: 24px; margin-bottom: 2rem;"></div>
          <div class="wire-block" style="width: 60%;"></div>
          <div class="wire-block" style="width: 70%;"></div>
          <div class="wire-block" style="width: 50%;"></div>
        </div>
        <!-- Main Content -->
        <div class="wire-main">
          <div class="wire-nav">
            <div class="wire-block" style="width: 120px; height: 20px;"></div>
            <div style="display:flex; gap: 1rem;">
              <div class="wire-block" style="width: 40px; border-radius: 50%; height: 40px;"></div>
            </div>
          </div>
          <div class="wire-block" style="width: 40%; height: 32px;"></div>
          <div class="wire-block" style="width: 100%; height: 120px; border-radius: var(--radius-lg);"></div>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="wire-card">
              <div class="wire-block" style="width: 50%;"></div>
              <div class="wire-block" style="width: 100%; height: 60px;"></div>
              <div class="wire-button">Action</div>
            </div>
            <div class="wire-card">
              <div class="wire-block" style="width: 40%;"></div>
              <div class="wire-input">Input placeholder...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- OR MOBILE FRAMES (Replace Desktop mockup with this if needed) -->
    <!--
    <div class="mobile-frame-container">
      <div class="mobile-frame">
        <div class="mobile-notch"></div>
        <div style="padding: 4rem 1.5rem 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; height: 100%;">
           Mobile Content
        </div>
      </div>
    </div>
    -->
  </div>
</body>
</html>
