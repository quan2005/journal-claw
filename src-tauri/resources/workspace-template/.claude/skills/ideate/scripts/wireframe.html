<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ideate - Wireframe</title>
  <style>
    /* INJECT: Paste the entire content of canvas.css here */
  </style>
</head>
<body>
  <div class="container wide">
    <div class="header">
      <h2>Dashboard Layout Wireframe</h2>
      <p>A structural view of the main interface</p>
    </div>
    
    <div class="mockup-window">
      <div class="mockup-bar">
        <div class="mockup-dot r"></div><div class="mockup-dot y"></div><div class="mockup-dot g"></div>
      </div>
      <div class="mockup-content">
        <!-- Sidebar -->
        <div class="sidebar">
          <div class="skel-block" style="width: 60%; margin-bottom: 1rem; background: var(--border);"></div>
          <div class="skel-block" style="width: 80%;"></div>
          <div class="skel-block" style="width: 90%;"></div>
          <div class="skel-block" style="width: 70%;"></div>
        </div>
        <!-- Main Content -->
        <div class="main">
          <div class="skel-nav">
            <div class="skel-block" style="width: 150px;"></div>
            <div class="skel-button">Create New</div>
          </div>
          <div class="skel-card" style="min-height: 200px; display:flex; align-items:center; justify-content:center; color: var(--text-muted);">
            Hero / Data Chart Area
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="skel-card" style="min-height: 150px;"></div>
            <div class="skel-card" style="min-height: 150px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
